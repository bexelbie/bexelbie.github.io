<?xml version="1.0" encoding="UTF-8"?>
<!--
  Microsoft logo: 4-square mark + "Microsoft" wordmark.
  Squares are the official brand colors. Wordmark text is rendered in white
  via SVG <text> with a Segoe UI / Helvetica / Arial fallback so it remains
  readable when Segoe UI isn't installed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 150" fill="none">
  <!-- 4-square mark -->
  <rect x="0"  y="0"  width="68" height="68" fill="#F25022"/>
  <rect x="74" y="0"  width="68" height="68" fill="#7FBA00"/>
  <rect x="0"  y="74" width="68" height="68" fill="#00A4EF"/>
  <rect x="74" y="74" width="68" height="68" fill="#FFB900"/>

  <!-- "Microsoft" wordmark, light weight, white -->
  <text x="166" y="103"
        font-family="'Segoe UI', 'Segoe UI Light', 'Helvetica Neue', Arial, sans-serif"
        font-size="98"
        font-weight="300"
        fill="#FFFFFF"
        letter-spacing="-1">Microsoft</text>
</svg>
